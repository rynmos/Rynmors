<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简易简谱制作工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "WenQuanYi Micro Hei", "Microsoft YaHei", sans-serif;
    background: #fff;
    color: #222;
    min-height: 100vh;
  }

  /* 顶部工具栏 */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .toolbar .title {
    font-size: 18px;
    font-weight: 600;
    margin-right: 16px;
    letter-spacing: 2px;
  }

  .toolbar .sep {
    width: 1px;
    height: 24px;
    background: #ddd;
    margin: 0 4px;
  }

  .toolbar label {
    font-size: 13px;
    color: #666;
  }

  .toolbar button, .toolbar select {
    padding: 6px 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fafafa;
    cursor: pointer;
    font-size: 14px;
    color: #333;
    transition: all .15s;
  }
  .toolbar button:hover, .toolbar select:hover {
    background: #f0f0f0;
    border-color: #bbb;
  }

  /* 歌名信息 */
  .song-info {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 20px 0;
  }
  .song-info input {
    border: none;
    border-bottom: 1px solid #ddd;
    font-size: 16px;
    padding: 4px 0;
    width: 100%;
    outline: none;
    color: #333;
  }
  .song-info input:focus { border-bottom-color: #999; }
  .song-info .info-row {
    display: flex;
    gap: 20px;
    margin-top: 8px;
  }
  .song-info .info-row input {
    flex: 1;
    font-size: 13px;
    color: #666;
  }

  /* 编辑区域 */
  .editor-wrap {
    max-width: 960px;
    margin: 20px auto;
    padding: 0 20px;
  }

  /* 一行 = 4 个小节 */
  .staff-line {
    display: flex;
    align-items: stretch;
    margin-bottom: 16px;
    padding: 4px 0;
    position: relative;
  }

  .staff-line .line-number {
    display: flex;
    align-items: center;
    padding: 0 8px 0 0;
    font-size: 13px;
    color: #999;
    user-select: none;
    min-width: 28px;
    justify-content: flex-end;
  }

  .staff-line .measures-row {
    display: flex;
    flex: 1;
    align-items: stretch;
    gap: 0;
  }

  /* 单个小节 - 无边框 */
  .measure {
    flex: 1;
    border-left: 2px solid #333;
    padding: 2px 4px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-height: 60px;
    position: relative;
  }
  .measure:last-child {
    border-right: 2px solid #333;
  }

  /* 小节内的行 */
  .measure-row-inner {
    display: flex;
    align-items: center;
    min-height: 52px;
    gap: 2px;
    flex-wrap: wrap;
  }

  /* 音符格子 */
  .note-cell {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 26px;
    height: 50px;
    padding: 0 1px;
    cursor: pointer;
    position: relative;
    user-select: none;
    border-radius: 3px;
    transition: background .1s;
  }
  .note-cell:hover { background: #e8eeff; }
  .note-cell.selected { background: #d0d8f0; border-radius: 3px; }

  .note-cell .dots-above {
    height: 12px;
    line-height: 10px;
    font-size: 18px;
    color: #333;
    visibility: hidden;
    font-weight: bold;
  }
  .note-cell .dots-above.show { visibility: visible; }

  .note-cell .note-char {
    font-size: 22px;
    font-weight: 500;
    line-height: 1.1;
    color: #111;
    min-width: 12px;
    text-align: center;
    padding: 0 1px;
  }
  .note-cell .note-char.empty {
    color: transparent;
    min-width: 12px;
  }

  .note-cell .dots-below {
    height: 12px;
    line-height: 10px;
    font-size: 18px;
    color: #333;
    visibility: hidden;
    font-weight: bold;
  }
  .note-cell .dots-below.show { visibility: visible; }

  /* 小节内添加音符按钮 */
  .add-note-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 30px;
    border: 1px dashed #ccc;
    border-radius: 3px;
    cursor: pointer;
    font-size: 16px;
    color: #bbb;
    margin: 2px 1px;
    transition: all .15s;
    vertical-align: middle;
  }
  .add-note-btn:hover {
    border-color: #999;
    color: #666;
    background: #f0f0f0;
  }

  /* 小节操作按钮 */
  .measure-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 0 4px;
    justify-content: center;
    min-width: 28px;
  }
  .measure-actions button {
    width: 24px;
    height: 24px;
    border: 1px solid #ddd;
    border-radius: 3px;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
    color: #888;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    padding: 0;
  }
  .measure-actions button:hover {
    background: #f0f0f0;
    border-color: #bbb;
    color: #333;
  }

  /* 行操作按钮 */
  .staff-line-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 0 4px;
    justify-content: center;
    min-width: 28px;
  }
  .staff-line-actions button {
    width: 24px;
    height: 24px;
    border: 1px solid #ddd;
    border-radius: 3px;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
    color: #888;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    padding: 0;
  }
  .staff-line-actions button:hover {
    background: #fee;
    border-color: #f88;
    color: #e44;
  }

  /* 数字键盘浮层 */
  .num-pad-overlay {
    display: none;
    position: fixed;
    z-index: 200;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,.12);
    padding: 12px;
  }
  .num-pad-overlay.show { display: block; }

  .num-pad-overlay .pad-title {
    font-size: 13px;
    color: #666;
    margin-bottom: 8px;
    text-align: center;
  }

  .num-pad-grid {
    display: grid;
    grid-template-columns: repeat(4, 44px);
    gap: 4px;
  }

  .num-pad-grid button {
    width: 44px;
    height: 38px;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #fafafa;
    font-size: 18px;
    cursor: pointer;
    transition: all .1s;
  }
  .num-pad-grid button:hover {
    background: #e8eeff;
    border-color: #99aaff;
  }
  .num-pad-grid button.empty-btn {
    color: #ccc;
    font-size: 14px;
  }

  .num-pad-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .num-pad-actions button {
    padding: 5px 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #fafafa;
    font-size: 13px;
    cursor: pointer;
    transition: all .1s;
  }
  .num-pad-actions button:hover { background: #f0f0f0; }
  .num-pad-actions button.active {
    background: #333;
    color: #fff;
    border-color: #333;
  }

  /* 控制面板 */
  .controls {
    max-width: 960px;
    margin: 16px auto;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .controls button {
    padding: 8px 18px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
    transition: all .15s;
  }
  .controls button:hover {
    background: #f5f5f5;
    border-color: #bbb;
  }
  .controls button.primary {
    background: #333;
    color: #fff;
    border-color: #333;
  }
  .controls button.primary:hover { background: #555; }

  /* 导出区域 */
  .export-area {
    max-width: 960px;
    margin: 20px auto 40px;
    padding: 0 20px;
  }
  .export-area h3 {
    font-size: 15px;
    margin-bottom: 8px;
    color: #444;
  }
  .export-area textarea {
    width: 100%;
    height: 100px;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 12px;
    font-size: 14px;
    font-family: "Courier New", monospace;
    resize: vertical;
    background: #fafafa;
  }

  /* 提示信息 */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #333;
    color: #fff;
    padding: 10px 24px;
    border-radius: 6px;
    font-size: 14px;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 右键菜单 */
  .ctx-menu {
    display: none;
    position: fixed;
    z-index: 300;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-shadow: 0 2px 12px rgba(0,0,0,.1);
    padding: 4px 0;
    min-width: 140px;
  }
  .ctx-menu.show { display: block; }
  .ctx-menu div {
    padding: 6px 16px;
    font-size: 13px;
    cursor: pointer;
    color: #333;
  }
  .ctx-menu div:hover { background: #f0f0f0; }

  /* 说明文字 */
  .help-text {
    max-width: 960px;
    margin: 10px auto 0;
    padding: 0 20px;
    font-size: 12px;
    color: #999;
    line-height: 1.8;
  }
</style>
</head>
<body>

<!-- 顶部工具栏 -->
<div class="toolbar">
  <span class="title">简谱制作工具</span>
  <div class="sep"></div>
  <label>调号：</label>
  <select id="keySelect">
    <option value="1=C">1=C</option>
    <option value="1=D">1=D</option>
    <option value="1=E">1=E</option>
    <option value="1=F">1=F</option>
    <option value="1=G">1=G</option>
    <option value="1=A">1=A</option>
    <option value="1=B">1=B</option>
  </select>
  <label>拍号：</label>
  <select id="timeSelect">
    <option value="4/4">4/4</option>
    <option value="3/4">3/4</option>
    <option value="2/4">2/4</option>
    <option value="6/8">6/8</option>
  </select>
  <div class="sep"></div>
  <button id="btnAddStaff">＋ 添加一行（4小节）</button>
  <div class="sep"></div>
  <button id="btnUndo">撤销</button>
  <button id="btnRedo">重做</button>
</div>

<!-- 歌曲信息 -->
<div class="song-info">
  <input id="songTitle" type="text" placeholder="歌曲名称" />
  <div class="info-row">
    <input id="songArtist" type="text" placeholder="作词 / 作曲" />
  </div>
</div>

<!-- 编辑区域 -->
<div class="editor-wrap" id="editorWrap"></div>

<!-- 控制按钮 -->
<div class="controls">
  <button class="primary" id="btnExportImg">导出为图片</button>
  <button id="btnCopy">复制简谱文本</button>
  <button id="btnClear">清空</button>
</div>

<!-- 导出文本区 -->
<div class="export-area">
  <h3>导出文本（可用作参考，推荐导出图片）</h3>
  <textarea id="exportText" readonly placeholder="点击"导出简谱文本"后内容将显示在这里..."></textarea>
</div>

<!-- 说明 -->
<div class="help-text">
  💡 使用说明：点击音符数字可修改；点击空白格子可添加新音符；在数字键盘面板选择高音/低音/中音；<br>
  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;· 高音：数字上方显示点 ·&nbsp;&nbsp;· 低音：数字下方显示点&nbsp;&nbsp;· 中音：无点<br>
  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;· 每行固定 4 个小节，每个小节的行数可自由增减（1~3行），适应多声部<br>
  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;· 空拍显示为空白；导出推荐用「导出为图片」，效果最佳
</div>

<!-- 数字键盘浮层 -->
<div class="num-pad-overlay" id="numPad">
  <div class="pad-title">选择音符</div>
  <div class="num-pad-grid" id="numPadGrid"></div>
  <div class="num-pad-actions">
    <button id="padHigh">高音</button>
    <button id="padLow">低音</button>
    <button id="padMid">中音</button>
    <button id="padEmpty">设为空白</button>
    <button id="padDelete">删除</button>
  </div>
</div>

<!-- 右键菜单 -->
<div class="ctx-menu" id="ctxMenu">
  <div data-action="delete">删除此音符</div>
  <div data-action="insert_before">在前方插入</div>
  <div data-action="insert_after">在后方插入</div>
  <div data-action="add_row_above">小节内上方加行</div>
  <div data-action="add_row_below">小节内下方加行</div>
  <div data-action="remove_row">删除此行</div>
</div>

<!-- 提示 -->
<div class="toast" id="toast"></div>

<script>
// ====== 状态 ======
const state = {
  staffs: [],
  history: [],
  historyIdx: -1,
  selected: null,
};

const MEASURES_PER_LINE = 4;

// ====== 初始化 ======
function initState() {
  state.staffs = [createStaffLine()];
  state.selected = { staff: 0, measure: 0, row: 0, col: 0 };
  saveHistory();
}

function createStaffLine() {
  const measures = [];
  for (let i = 0; i < MEASURES_PER_LINE; i++) {
    measures.push({ rows: [ { notes: [] } ] });
  }
  return measures;
}

// ====== 渲染 ======
function render() {
  const wrap = document.getElementById('editorWrap');
  wrap.innerHTML = '';

  state.staffs.forEach((measures, si) => {
    const lineEl = document.createElement('div');
    lineEl.className = 'staff-line';

    // 行号
    const lineNum = document.createElement('div');
    lineNum.className = 'line-number';
    lineNum.textContent = si + 1;
    lineEl.appendChild(lineNum);

    // 小节容器
    const measuresRow = document.createElement('div');
    measuresRow.className = 'measures-row';

    measures.forEach((measure, mi) => {
      const measureEl = document.createElement('div');
      measureEl.className = 'measure';

      // 渲染每行的音符（无行标签）
      measure.rows.forEach((row, ri) => {
        const rowEl = document.createElement('div');
        rowEl.className = 'measure-row-inner';

        row.notes.forEach((note, ni) => {
          const cell = createNoteCell(note, si, mi, ri, ni);
          rowEl.appendChild(cell);
        });

        // 该行末尾的添加按钮
        const addBtn = document.createElement('div');
        addBtn.className = 'add-note-btn';
        addBtn.textContent = '+';
        addBtn.title = '添加音符';
        addBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          state.selected = { staff: si, measure: mi, row: ri, col: row.notes.length };
          render();
          showNumPad(e.clientX, e.clientY, si, mi, ri, row.notes.length);
        });
        rowEl.appendChild(addBtn);

        measureEl.appendChild(rowEl);
      });

      // 小节操作按钮（右侧）
      const actions = document.createElement('div');
      actions.className = 'measure-actions';

      if (measure.rows.length < 3) {
        const addRowBtn = document.createElement('button');
        addRowBtn.title = '添加一行';
        addRowBtn.textContent = '+';
        addRowBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          measure.rows.push({ notes: [] });
          saveHistory();
          render();
        });
        actions.appendChild(addRowBtn);
      }

      if (measure.rows.length > 1) {
        const delRowBtn = document.createElement('button');
        delRowBtn.title = '删除最下行';
        delRowBtn.textContent = '−';
        delRowBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          measure.rows.pop();
          saveHistory();
          render();
        });
        actions.appendChild(delRowBtn);
      }

      measureEl.appendChild(actions);
      measuresRow.appendChild(measureEl);
    });

    // 行级操作
    const lineActions = document.createElement('div');
    lineActions.className = 'staff-line-actions';

    if (state.staffs.length > 1) {
      const delLineBtn = document.createElement('button');
      delLineBtn.title = '删除此行';
      delLineBtn.textContent = '×';
      delLineBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        state.staffs.splice(si, 1);
        state.selected = null;
        saveHistory();
        render();
      });
      lineActions.appendChild(delLineBtn);
    }

    lineEl.appendChild(measuresRow);
    lineEl.appendChild(lineActions);
    wrap.appendChild(lineEl);
  });
}

function createNoteCell(note, si, mi, ri, ni) {
  const cell = document.createElement('div');
  cell.className = 'note-cell';

  const isEmpty = (note.value === 0 || note.value === null || note.value === undefined);

  if (state.selected &&
      state.selected.staff === si &&
      state.selected.measure === mi &&
      state.selected.row === ri &&
      state.selected.col === ni) {
    cell.classList.add('selected');
  }

  // 高音点
  const above = document.createElement('div');
  above.className = 'dots-above' + (note.pitch === 'high' ? ' show' : '');
  above.textContent = '•';
  cell.appendChild(above);

  // 数字
  const char = document.createElement('div');
  char.className = 'note-char' + (isEmpty ? ' empty' : '');
  char.textContent = isEmpty ? ' ' : note.value;
  cell.appendChild(char);

  // 低音点
  const below = document.createElement('div');
  below.className = 'dots-below' + (note.pitch === 'low' ? ' show' : '');
  below.textContent = '•';
  cell.appendChild(below);

  // 点击
  cell.addEventListener('click', (e) => {
    e.stopPropagation();
    state.selected = { staff: si, measure: mi, row: ri, col: ni };
    render();
    showNumPad(e.clientX, e.clientY, si, mi, ri, ni);
  });

  // 右键
  cell.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    state.selected = { staff: si, measure: mi, row: ri, col: ni };
    showCtxMenu(e.clientX, e.clientY, si, mi, ri, ni);
  });

  return cell;
}

// ====== 数字键盘 ======
function buildNumPad() {
  const grid = document.getElementById('numPadGrid');
  for (let i = 1; i <= 7; i++) {
    const btn = document.createElement('button');
    btn.textContent = i;
    btn.addEventListener('click', () => placeNote(i, state._padPitch || 'mid'));
    grid.appendChild(btn);
  }
  const emptyBtn = document.createElement('button');
  emptyBtn.textContent = '空';
  emptyBtn.className = 'empty-btn';
  emptyBtn.addEventListener('click', () => placeNote(0, state._padPitch || 'mid'));
  grid.appendChild(emptyBtn);
}

function showNumPad(x, y, si, mi, ri, ni) {
  const pad = document.getElementById('numPad');
  pad.style.left = Math.min(x, window.innerWidth - 380) + 'px';
  pad.style.top = Math.min(y + 10, window.innerHeight - 220) + 'px';
  pad.classList.add('show');
  state._padStaff = si;
  state._padMeasure = mi;
  state._padRow = ri;
  state._padCol = ni;
  updatePadPitchUI();
}

function hideNumPad() {
  document.getElementById('numPad').classList.remove('show');
}

function updatePadPitchUI() {
  const pitch = state._padPitch || 'mid';
  document.getElementById('padHigh').className = pitch === 'high' ? 'active' : '';
  document.getElementById('padLow').className = pitch === 'low' ? 'active' : '';
  document.getElementById('padMid').className = pitch === 'mid' ? 'active' : '';
}

function placeNote(value, pitch) {
  const si = state._padStaff, mi = state._padMeasure;
  const ri = state._padRow, ci = state._padCol;
  if (si === undefined) return;
  const measure = state.staffs[si] && state.staffs[si][mi];
  if (!measure) return;
  const row = measure.rows[ri];
  if (!row) return;

  if (ci >= 0 && ci <= row.notes.length) {
    row.notes[ci] = { value, pitch };
    saveHistory();
    render();
  }
}

document.getElementById('padHigh').addEventListener('click', () => {
  state._padPitch = 'high';
  updatePadPitchUI();
  applyPitchToSelected('high');
});
document.getElementById('padLow').addEventListener('click', () => {
  state._padPitch = 'low';
  updatePadPitchUI();
  applyPitchToSelected('low');
});
document.getElementById('padMid').addEventListener('click', () => {
  state._padPitch = 'mid';
  updatePadPitchUI();
  applyPitchToSelected('mid');
});
document.getElementById('padEmpty').addEventListener('click', () => {
  placeNote(0, state._padPitch || 'mid');
});
document.getElementById('padDelete').addEventListener('click', () => {
  const si = state._padStaff, mi = state._padMeasure;
  const ri = state._padRow, ci = state._padCol;
  if (si === undefined) return;
  deleteNote(si, mi, ri, ci);
  hideNumPad();
});

function applyPitchToSelected(pitch) {
  const si = state._padStaff, mi = state._padMeasure;
  const ri = state._padRow, ci = state._padCol;
  if (si === undefined) return;
  const measure = state.staffs[si] && state.staffs[si][mi];
  if (!measure) return;
  const row = measure.rows[ri];
  if (!row || !row.notes[ci]) return;
  row.notes[ci].pitch = pitch;
  saveHistory();
  render();
}

// ====== 右键菜单 ======
const ctxMenu = document.getElementById('ctxMenu');
function showCtxMenu(x, y, si, mi, ri, ni) {
  ctxMenu.style.left = x + 'px';
  ctxMenu.style.top = y + 'px';
  ctxMenu.classList.add('show');
  state._ctxStaff = si;
  state._ctxMeasure = mi;
  state._ctxRow = ri;
  state._ctxCol = ni;
}
function hideCtxMenu() { ctxMenu.classList.remove('show'); }

ctxMenu.addEventListener('click', (e) => {
  const action = e.target.dataset.action;
  const si = state._ctxStaff, mi = state._ctxMeasure;
  const ri = state._ctxRow, ci = state._ctxCol;
  const measure = state.staffs[si] && state.staffs[si][mi];
  if (!measure) { hideCtxMenu(); return; }

  if (action === 'delete') {
    deleteNote(si, mi, ri, ci);
  } else if (action === 'insert_before') {
    measure.rows[ri].notes.splice(ci, 0, { value: 0, pitch: 'mid' });
    state.selected = { staff: si, measure: mi, row: ri, col: ci };
    saveHistory();
    render();
  } else if (action === 'insert_after') {
    measure.rows[ri].notes.splice(ci + 1, 0, { value: 0, pitch: 'mid' });
    state.selected = { staff: si, measure: mi, row: ri, col: ci + 1 };
    saveHistory();
    render();
  } else if (action === 'add_row_above') {
    measure.rows.splice(ri, 0, { notes: [] });
    saveHistory();
    render();
  } else if (action === 'add_row_below') {
    if (measure.rows.length < 3) {
      measure.rows.splice(ri + 1, 0, { notes: [] });
      saveHistory();
      render();
    }
  } else if (action === 'remove_row') {
    if (measure.rows.length > 1) {
      measure.rows.splice(ri, 1);
      saveHistory();
      render();
    }
  }
  hideCtxMenu();
});

document.addEventListener('click', () => { hideCtxMenu(); hideNumPad(); });

// ====== 删除音符 ======
function deleteNote(si, mi, ri, ci) {
  const measure = state.staffs[si] && state.staffs[si][mi];
  if (!measure) return;
  const row = measure.rows[ri];
  if (!row) return;

  if (row.notes.length <= 1) {
    row.notes[0] = { value: 0, pitch: 'mid' };
  } else {
    row.notes.splice(ci, 1);
  }
  state.selected = { staff: si, measure: mi, row: ri, col: ci };
  saveHistory();
  render();
}

// ====== 键盘导航 ======
document.addEventListener('keydown', (e) => {
  if (state.selected) {
    const { staff, measure, row, col } = state.selected;
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      navigate(staff, measure, row, col + 1);
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      navigate(staff, measure, row, col - 1);
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      navigate(staff, measure, row + 1, col);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      navigate(staff, measure, row - 1, col);
    } else if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault();
      deleteNote(staff, measure, row, col);
    }
  }
  if (document.getElementById('numPad').classList.contains('show')) {
    const k = e.key;
    if (k >= '1' && k <= '7') {
      placeNote(parseInt(k), state._padPitch || 'mid');
      return;
    }
    if (k === 'Escape') { hideNumPad(); return; }
  }
});

function navigate(si, mi, ri, ci) {
  if (si < 0 || si >= state.staffs.length) return;
  const measure = state.staffs[si] && state.staffs[si][mi];
  if (!measure) {
    if (mi < state.staffs[si].length - 1) {
      navigate(si, mi + 1, ri, 0);
    }
    return;
  }
  const row = measure.rows[ri];
  if (!row) {
    if (ri < measure.rows.length) {
      navigate(si, mi, 0, ci);
    }
    return;
  }
  if (ci < 0 || ci >= row.notes.length) {
    if (ci < 0 && mi > 0) {
      const prevMeasure = state.staffs[si][mi - 1];
      const prevRow = prevMeasure.rows[ri] || prevMeasure.rows[0];
      navigate(si, mi - 1, ri, prevRow.notes.length - 1);
    } else if (ci >= row.notes.length && mi < state.staffs[si].length - 1) {
      navigate(si, mi + 1, ri, 0);
    }
    return;
  }
  state.selected = { staff: si, measure: mi, row: ri, col: ci };
  render();
}

// ====== 添加行 ======
document.getElementById('btnAddStaff').addEventListener('click', () => {
  state.staffs.push(createStaffLine());
  saveHistory();
  render();
});

// ====== 导出为图片 ======
document.getElementById('btnExportImg').addEventListener('click', () => {
  exportAsImage();
});

function exportAsImage() {
  const title = document.getElementById('songTitle').value.trim();
  const artist = document.getElementById('songArtist').value.trim();
  const key = document.getElementById('keySelect').value;
  const time = document.getElementById('timeSelect').value;

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  // ===== 布局参数 =====
  const canvasWidth = 1000;
  const lineGap = 18;           // 行之间的空隙
  const FONT_SIZE = 26;         // 数字字号（大一点更清晰）
  const DOT_RADIUS = 2.2;      // 点的半径（适中）
  const MEASURE_V_PADDING = 12; // 小节上下内边距

  // 核心思路：每个"列位置"在不同行之间错开 x 偏移，避免点重叠
  // 每个音符占用的水平空间 = 数字宽度 + 左右 padding 给点用
  // 我们用固定列宽，所有行的同一列共享 x，但通过增大行高来确保垂直方向不重叠

  // 垂直布局参数（像素）：
  const ABOVE_DIGIT = 16;   // 高音点到数字基线的距离
  const BELOW_DIGIT = 14;   // 低音点到数字基线的距离
  // 单行内容的高度 = ABOVE_DIGIT + 数字高度 + BELOW_DIGIT
  // 数字高度约等于 FONT_SIZE * 0.75
  const SINGLE_ROW_CONTENT = ABOVE_DIGIT + FONT_SIZE * 0.75 + BELOW_DIGIT; // ~49px
  const ROW_SPACING = 6;    // 行与行之间的额外间距
  const MAX_ROWS = 3;

  // 一小节内容高度 = 上边距 + rows*(行内容+行间距) - 最后一行无行间距 + 下边距
  const singleMeasureContentH = MEASURE_V_PADDING * 2 + MAX_ROWS * SINGLE_ROW_CONTENT + (MAX_ROWS - 1) * ROW_SPACING;
  // ~12*2 + 3*49 + 2*6 = 24 + 147 + 12 = 183px

  const headerHeight = 80;
  const footerHeight = 20;

  const totalHeight = headerHeight + state.staffs.length * (singleMeasureContentH + lineGap) + footerHeight;
  canvas.width = canvasWidth;
  canvas.height = totalHeight;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ===== 标题区 =====
  let y = 30;
  ctx.fillStyle = '#222';
  ctx.font = 'bold 22px "WenQuanYi Micro Hei"';
  ctx.textAlign = 'center';
  ctx.fillText(title || '歌曲名称', canvasWidth / 2, y);

  y += 28;
  ctx.font = '14px "WenQuanYi Micro Hei"';
  ctx.fillStyle = '#666';
  ctx.fillText(artist || '', canvasWidth / 2, y);

  y += 20;
  ctx.font = '14px "WenQuanYi Micro Hei"';
  ctx.fillStyle = '#444';
  ctx.fillText(key + '    ' + time, canvasWidth / 2, y);

  y += 24;

  // ===== 绘制每行简谱 =====
  state.staffs.forEach((measures, si) => {
    const lineTop = y + si * (singleMeasureContentH + lineGap);

    // 行首序号
    ctx.font = '13px "WenQuanYi Micro Hei"';
    ctx.fillStyle = '#999';
    ctx.textAlign = 'right';
    ctx.fillText(si + 1 + '', 36, lineTop + singleMeasureContentH / 2 + 4);

    const measureAreaLeft = 50;
    const measureWidth = (canvasWidth - measureAreaLeft - 30) / MEASURES_PER_LINE;

    // 计算该行所有小节中最大的 notes 数量
    let maxNotesInLine = 0;
    measures.forEach((measure) => {
      measure.rows.forEach((row) => {
        maxNotesInLine = Math.max(maxNotesInLine, row.notes.length);
      });
    });

    // 音符间距（列宽）
    const colWidth = Math.floor((measureWidth - 24) / Math.max(maxNotesInLine, 1));

    measures.forEach((measure, mi) => {
      const mx = measureAreaLeft + mi * measureWidth;

      // 小节竖线
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(mx, lineTop + 4);
      ctx.lineTo(mx, lineTop + singleMeasureContentH - 4);
      ctx.stroke();

      const rowCount = measure.rows.length;

      measure.rows.forEach((row, ri) => {
        // 该行的基准 y
        const rowTop = lineTop + MEASURE_V_PADDING + ri * (SINGLE_ROW_CONTENT + ROW_SPACING);
        const startX = mx + 12;

        row.notes.forEach((note, ni) => {
          const nx = startX + ni * colWidth;
          const isEmpty = (note.value === 0 || note.value === null || note.value === undefined);

          if (isEmpty) return;

          // 数字基线：行的中间偏下一点
          const digitBaseline = rowTop + ABOVE_DIGIT + FONT_SIZE * 0.55;

          // 数字
          ctx.font = FONT_SIZE + 'px "WenQuanYi Micro Hei"';
          ctx.fillStyle = '#111';
          ctx.textAlign = 'center';
          ctx.fillText(note.value + '', nx, digitBaseline);

          // 高音点（在 ABOVE_DIGIT 偏移处）
          if (note.pitch === 'high') {
            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.arc(nx, rowTop + ABOVE_DIGIT * 0.45, DOT_RADIUS, 0, Math.PI * 2);
            ctx.fill();
          }

          // 低音点
          if (note.pitch === 'low') {
            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.arc(nx, rowTop + ABOVE_DIGIT + FONT_SIZE * 0.75 + BELOW_DIGIT * 0.45, DOT_RADIUS, 0, Math.PI * 2);
            ctx.fill();
          }
        });
      });
    });

    // 最后一个小节右边竖线
    const lastMx = measureAreaLeft + MEASURES_PER_LINE * measureWidth;
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(lastMx, lineTop + 4);
    ctx.lineTo(lastMx, lineTop + singleMeasureContentH - 4);
    ctx.stroke();
  });

  // 下载
  canvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (title || '简谱') + '.png';
    a.click();
    URL.revokeObjectURL(url);
    showToast('已导出为图片');
  });
}

// ====== 导出文本 ======
document.getElementById('btnCopy').addEventListener('click', () => {
  const title = document.getElementById('songTitle').value.trim();
  const artist = document.getElementById('songArtist').value.trim();
  const key = document.getElementById('keySelect').value;
  const time = document.getElementById('timeSelect').value;

  let text = '';
  if (title) text += title + '\n';
  if (artist) text += artist + '\n';
  text += key + '  ' + time + '\n';
  text += '─────────────────────────\n';

  state.staffs.forEach((measures, si) => {
    text += (si + 1) + '  |';

    let maxNotes = 0;
    measures.forEach(m => {
      m.rows.forEach(r => {
        maxNotes = Math.max(maxNotes, r.notes.length);
      });
    });

    for (let ni = 0; ni < maxNotes; ni++) {
      if (ni > 0) text += '  |';
      measures.forEach((measure, mi) => {
        measure.rows.forEach((row, ri) => {
          if (ri > 0) text += ' | ';
          const note = row.notes[ni];
          if (!note) {
            text += '  ';
          } else {
            const isEmpty = (note.value === 0 || note.value === null || note.value === undefined);
            if (isEmpty) {
              text += '  ';
            } else if (note.pitch === 'high') {
              text += '\u02D9' + note.value + ' ';
            } else if (note.pitch === 'low') {
              text += note.value + '\u02D9 ';
            } else {
              text += note.value + ' ';
            }
          }
        });
      });
    }
    text += '|\n';
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制到剪贴板');
  });
});

// ====== 清空 ======
document.getElementById('btnClear').addEventListener('click', () => {
  if (!confirm('确定要清空所有内容吗？')) return;
  initState();
  render();
  document.getElementById('exportText').value = '';
});

// ====== 撤销/重做 ======
function saveHistory() {
  const snap = JSON.stringify(state.staffs);
  if (state.historyIdx < state.history.length - 1) {
    state.history = state.history.slice(0, state.historyIdx + 1);
  }
  state.history.push(snap);
  state.historyIdx = state.history.length - 1;
}

document.getElementById('btnUndo').addEventListener('click', () => {
  if (state.historyIdx > 0) {
    state.historyIdx--;
    state.staffs = JSON.parse(state.history[state.historyIdx]);
    render();
  }
});
document.getElementById('btnRedo').addEventListener('click', () => {
  if (state.historyIdx < state.history.length - 1) {
    state.historyIdx++;
    state.staffs = JSON.parse(state.history[state.historyIdx]);
    render();
  }
});

// ====== Toast ======
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ====== 启动 ======
buildNumPad();
initState();
render();
</script>
