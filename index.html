<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Rynmos简易简谱制作器</title>
<style>
    body {
        font-family: "Microsoft YaHei", sans-serif;
        background: #fff;
        color: #333;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .toolbar {
        margin-bottom: 15px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .toolbar button, .toolbar select, .toolbar input {
        padding: 6px 12px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #f9f9f9;
    }
    .toolbar button:hover { background: #e9e9e9; }
    .staff-container {
        width: 95%;
        max-width: 900px;
        margin-top: 10px;
        border: none;
        padding: 20px;
        box-sizing: border-box;
    }
    .staff-line {
        display: flex;
        align-items: flex-start;
        margin-bottom: 20px; /* 行间距 */
        position: relative;
    }
    .line-number {
        width: 30px;
        text-align: right;
        padding-right: 10px;
        font-size: 18px;
        font-weight: bold;
        flex-shrink: 0;
        padding-top: 15px; /* 对齐小节行 */
    }
    .measures-row {
        display: flex;
        flex-grow: 1;
        border-left: 1px solid #333;
    }
    .measure {
        flex: 1;
        border-right: 1px solid #333;
        padding: 4px 2px;
        min-height: 90px; /* 容纳3行 */
        display: flex;
        flex-direction: column;
        justify-content: space-around;
    }
    .measure-row-inner {
        height: 30px; /* 每行固定高度 */
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2px;
    }
    .note-cell {
        width: 24px;
        height: 28px;
        line-height: 28px;
        text-align: center;
        font-size: 20px;
        cursor: pointer;
        position: relative;
        vertical-align: middle;
        font-weight: bold;
    }
    .note-cell:hover { background: #f0f0f0; }
    .dot-high, .dot-low {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 9px; /* 点的大小 */
        line-height: 1;
        color: #333;
    }
    .dot-high { top: -2px; } /* 高音点位置 */
    .dot-low { bottom: -2px; } /* 低音点位置 */
    
    /* 超高音两点竖排样式 */
    .dot-upper {
        position: absolute;
        top: -6px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        line-height: 6px; /* 控制两点间距 */
        font-size: 9px;
        color: #333;
    }

    .number-pad-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.3);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }
    .number-pad {
        background: white;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 15px;
        display: grid;
        grid-template-columns: repeat(4, 50px);
        gap: 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .number-pad button {
        height: 45px;
        font-size: 18px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: #fafafa;
        cursor: pointer;
    }
    .number-pad button:hover { background: #eaeaea; }
    .np-empty { grid-column: span 2; }
    .np-delete { background: #ffebee !important; color: #c62828; }

    .history-modal {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.4);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
    }
    .history-content {
        background: white;
        padding: 20px;
        border-radius: 8px;
        width: 90%;
        max-width: 500px;
        max-height: 80vh;
        overflow-y: auto;
    }
    .history-item {
        border-bottom: 1px solid #eee;
        padding: 10px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .history-info span { display: block; font-size: 12px; color: #666; }
    .history-actions button { margin-left: 5px; padding: 4px 8px; }
</style>
</head>
<body>

<div class="toolbar">
    <input id="songTitle" placeholder="歌名">
    <input id="songAuthor" placeholder="作词/作曲">
    <select id="keySelect"></select>
    <select id="beatSelect"></select>
    <button onclick="addStaffLine()">添加小节行</button>
    <button onclick="saveToHistory()">💾 保存</button>
    <button onclick="showHistory()">📋 历史记录</button>
    <button onclick="exportAsImage()">导出图片</button>
</div>

<div id="staffContainer" class="staff-container"></div>

<!-- 数字键盘 -->
<div id="numberPadOverlay" class="number-pad-overlay">
    <div class="number-pad">
        <button data-num="1">1</button><button data-num="2">2</button>
        <button data-num="3">3</button><button data-num="4">4</button>
        <button data-num="5">5</button><button data-num="6">6</button>
        <button data-num="7">7</button><button data-num="0">空</button>
        <button onclick="setPitch('high2')">超高</button>
        <button onclick="setPitch('high')">高音</button>
        <button onclick="setPitch('mid')">中音</button>
        <button onclick="setPitch('low')">低音</button>
        <button class="np-empty" onclick="closePad()">取消</button>
        <button class="np-delete" onclick="deleteNote()">删除</button>
    </div>
</div>

<!-- 历史记录弹窗 -->
<div id="historyModal" class="history-modal">
    <div class="history-content">
        <h3>历史记录</h3>
        <div id="historyList"></div>
        <button onclick="closeHistory()" style="margin-top:15px;">关闭</button>
    </div>
</div>

<script>
let currentCell = null;
let historyData = JSON.parse(localStorage.getItem('jianpu_history')) || [];
const MAX_HISTORY = 50;

// 初始化调号和拍号
for(let i=1;i<=7;i++) document.getElementById('keySelect').innerHTML += `<option>1=${['C','D','E','F','G','A','B'][i-1]}</option>`;
['4/4','3/4','2/4','6/8'].forEach(b => document.getElementById('beatSelect').innerHTML += `<option>${b}</option>`);

function createMeasure(rows=1) {
    const measure = document.createElement('div');
    measure.className = 'measure';
    for(let r=0; r<rows; r++) {
        const row = document.createElement('div');
        row.className = 'measure-row-inner';
        for(let c=0; c<4; c++) { // 固定4个音符位
            const cell = document.createElement('span');
            cell.className = 'note-cell';
            cell.dataset.note = '';
            cell.dataset.pitch = 'mid';
            cell.textContent = '';
            cell.onclick = () => openPad(cell);
            cell.oncontextmenu = (e) => { e.preventDefault(); showContextMenu(e, cell); };
            row.appendChild(cell);
        }
        measure.appendChild(row);
    }
    return measure;
}

function addStaffLine() {
    const container = document.getElementById('staffContainer');
    const lineNum = container.children.length + 1;
    const line = document.createElement('div');
    line.className = 'staff-line';
    line.innerHTML = `<div class="line-number">${lineNum}</div><div class="measures-row"></div>`;
    const measuresRow = line.querySelector('.measures-row');
    for(let i=0; i<4; i++) measuresRow.appendChild(createMeasure(1)); // 一行4小节
    container.appendChild(line);
}

function openPad(cell) {
    currentCell = cell;
    document.getElementById('numberPadOverlay').style.display = 'flex';
}

function closePad() {
    document.getElementById('numberPadOverlay').style.display = 'none';
}

document.querySelectorAll('.number-pad button[data-num]').forEach(btn => {
    btn.onclick = () => {
        if (!currentCell) return;
        const num = btn.dataset.num;
        currentCell.dataset.note = num;
        renderCell(currentCell);
        closePad();
    };
});

function setPitch(pitch) {
    if (!currentCell) return;
    currentCell.dataset.pitch = pitch;
    renderCell(currentCell);
}

function deleteNote() {
    if (!currentCell) return;
    currentCell.dataset.note = '';
    currentCell.dataset.pitch = 'mid';
    renderCell(currentCell);
    closePad();
}

function renderCell(cell) {
    const note = cell.dataset.note;
    const pitch = cell.dataset.pitch;
    let dotsHTML = '';
    
    if (pitch === 'high2') {
        dotsHTML = '<span class="dot-upper"><span>·</span><span>·</span></span>';
    } else if (pitch === 'high') {
        dotsHTML = '<span class="dot-high">·</span>';
    } else if (pitch === 'low') {
        dotsHTML = '<span class="dot-low">·</span>';
    }
    
    cell.innerHTML = dotsHTML + (note === '0' ? '' : note);
}

function showContextMenu(e, cell) {
    e.preventDefault();
    const existing = document.getElementById('ctxMenu');
    if(existing) existing.remove();

    const menu = document.createElement('div');
    menu.id = 'ctxMenu';
    menu.style.cssText = `position:fixed; top:${e.clientY}px; left:${e.clientX}px; background:#fff; border:1px solid #ccc; z-index:2000;`;
    const actions = [
        {t:'前方插入行', f:()=>insertRow(cell, 'before')},
        {t:'后方插入行', f:()=>insertRow(cell, 'after')},
        {t:'删除此行', f:()=>deleteRow(cell)},
        {t:'设为空白', f:()=>{cell.dataset.note=''; renderCell(cell);}}
    ];
    actions.forEach(a => {
        const d = document.createElement('div');
        d.textContent = a.t;
        d.style.cssText = 'padding:5px 10px; cursor:pointer;';
        d.onmouseover = ()=>d.style.background='#eee';
        d.onmouseout = ()=>d.style.background='#fff';
        d.onclick = ()=>{a.f(); menu.remove();};
        menu.appendChild(d);
    });
    document.body.appendChild(menu);
    document.addEventListener('click', () => menu.remove(), {once:true});
}

function insertRow(cell, pos) {
    const measure = cell.closest('.measure');
    const rows = measure.querySelectorAll('.measure-row-inner');
    const idx = Array.from(rows).indexOf(cell.parentElement);
    const newRow = document.createElement('div');
    newRow.className = 'measure-row-inner';
    for(let i=0;i<4;i++) {
        const c = document.createElement('span');
        c.className = 'note-cell';
        c.dataset.note = '';
        c.dataset.pitch = 'mid';
        c.onclick = () => openPad(c);
        c.oncontextmenu = (e) => {e.preventDefault(); showContextMenu(e,c);};
        newRow.appendChild(c);
    }
    if(pos==='before') measure.insertBefore(newRow, rows[idx]);
    else measure.insertBefore(newRow, rows[idx].nextSibling);
}

function deleteRow(cell) {
    const measure = cell.closest('.measure');
    const rows = measure.querySelectorAll('.measure-row-inner');
    if(rows.length <= 1) return alert('至少保留一行');
    cell.parentElement.remove();
}

// --- 历史记录 ---
function saveToHistory() {
    const data = {
        title: document.getElementById('songTitle').value,
        author: document.getElementById('songAuthor').value,
        key: document.getElementById('keySelect').value,
        beat: document.getElementById('beatSelect').value,
        staff: document.getElementById('staffContainer').innerHTML,
        time: new Date().toLocaleString()
    };
    historyData.unshift(data);
    if(historyData.length > MAX_HISTORY) historyData.pop();
    localStorage.setItem('jianpu_history', JSON.stringify(historyData));
    alert('已保存到本地历史记录！');
}

function showHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    if(historyData.length === 0) { list.innerHTML = '<p>暂无记录</p>'; }
    historyData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
            <div class="history-info">
                <strong>${item.title||'未命名'}</strong>
                <span>${item.author||''} | ${item.key} | ${item.time}</span>
            </div>
            <div class="history-actions">
                <button onclick="loadHistory(${index})">导入编辑</button>
                <button onclick="deleteHistory(${index})">删除</button>
            </div>
        `;
        list.appendChild(div);
    });
    document.getElementById('historyModal').style.display = 'flex';
}

function loadHistory(index) {
    const item = historyData[index];
    document.getElementById('songTitle').value = item.title;
    document.getElementById('songAuthor').value = item.author;
    document.getElementById('keySelect').value = item.key;
    document.getElementById('beatSelect').value = item.beat;
    document.getElementById('staffContainer').innerHTML = item.staff;
    // 重新绑定事件
    document.querySelectorAll('.note-cell').forEach(cell => {
        cell.onclick = () => openPad(cell);
        cell.oncontextmenu = (e) => { e.preventDefault(); showContextMenu(e, cell); };
        renderCell(cell);
    });
    closeHistory();
}

function deleteHistory(index) {
    historyData.splice(index, 1);
    localStorage.setItem('jianpu_history', JSON.stringify(historyData));
    showHistory();
}

function closeHistory() {
    document.getElementById('historyModal').style.display = 'none';
}

// --- 导出图片 ---
function exportAsImage() {
    const container = document.getElementById('staffContainer');
    const scale = 2; // 清晰度倍数
    const tempCanvas = document.createElement('canvas');
    const ctx = tempCanvas.getContext('2d');
    
    // 计算尺寸
    const lines = container.querySelectorAll('.staff-line');
    let totalHeight = 40; // 预留顶部空间
    const lineHeight = 110; // 每行高度（含行距）
    const lineWidth = 860;
    
    tempCanvas.width = lineWidth * scale;
    tempCanvas.height = (lines.length * lineHeight + 60) * scale;
    
    ctx.scale(scale, scale);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, tempCanvas.width/scale, tempCanvas.height/scale);
    ctx.font = 'bold 20px Microsoft YaHei';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#333';

    lines.forEach((line, lIdx) => {
        const yBase = 40 + lIdx * lineHeight;
        
        // 行号
        ctx.textAlign = 'right';
        ctx.fillText(lIdx + 1, 25, yBase + 45);
        ctx.textAlign = 'center';

        const measures = line.querySelectorAll('.measure');
        const measureWidth = lineWidth / 4;
        
        measures.forEach((measure, mIdx) => {
            const xStart = 35 + mIdx * measureWidth;
            const rows = measure.querySelectorAll('.measure-row-inner');
            
            // 绘制小节竖线
            ctx.beginPath();
            ctx.moveTo(xStart, yBase);
            ctx.lineTo(xStart, yBase + 90);
            ctx.stroke();
            
            rows.forEach((row, rIdx) => {
                const cells = row.querySelectorAll('.note-cell');
                const rowY = yBase + 15 + rIdx * 30; // 行内垂直位置
                
                cells.forEach((cell, cIdx) => {
                    const note = cell.dataset.note;
                    const pitch = cell.dataset.pitch;
                    const x = xStart + 10 + cIdx * ((measureWidth - 10) / 4);
                    
                    if(note && note !== '0') {
                        // 绘制点（超高音竖排两点）
                        if(pitch === 'high2') {
                            ctx.beginPath(); ctx.arc(x, rowY - 10, 2, 0, Math.PI*2); ctx.fill(); // 上点
                            ctx.beginPath(); ctx.arc(x, rowY - 4, 2, 0, Math.PI*2); ctx.fill(); // 下点
                        } else if(pitch === 'high') {
                            ctx.beginPath(); ctx.arc(x, rowY - 10, 2, 0, Math.PI*2); ctx.fill();
                        } else if(pitch === 'low') {
                            ctx.beginPath(); ctx.arc(x, rowY + 12, 2, 0, Math.PI*2); ctx.fill();
                        }
                        // 绘制数字
                        ctx.fillText(note, x, rowY + 2);
                    }
                });
            });
        });
        // 最后一个小节右边竖线
        ctx.beginPath();
        ctx.moveTo(35 + 4 * measureWidth, yBase);
        ctx.lineTo(35 + 4 * measureWidth, yBase + 90);
        ctx.stroke();
    });

    const link = document.createElement('a');
    link.download = `简谱_${(document.getElementById('songTitle').value||'未命名')}.png`;
    link.href = tempCanvas.toDataURL('image/png');
    link.click();
}

// 初始化第一行
addStaffLine();
</script>
</body>
</html>
